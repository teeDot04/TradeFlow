name: Android APK Build

on:
  push:
    branches: [ main ]
    paths:
      - 'trading-journal-android/**'
      - '.github/workflows/android_build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant Gradle Permissions
        run: chmod +x trading-journal-android/gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: trading-journal-android

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TradeFlow-debug-apk
          path: trading-journal-android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
