name: Android APK Build

on:
  push:
    branches: [ main ]
    paths:
      - 'TradeFlow-Android/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle Wrapper (Locked to 8.9)
        run: gradle wrapper --gradle-version 8.9
        working-directory: TradeFlow-Android

      - name: Grant Gradle Permissions
        run: chmod +x TradeFlow-Android/gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: TradeFlow-Android

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TradeFlow-debug-apk
          path: TradeFlow-Android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
