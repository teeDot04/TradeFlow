name: Build Trading Journal APK

on:
  push:
    branches:
      - 'feat/agent-comments'
      - 'feat/journal-*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: trading-journal-android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            trading-journal-android/.gradle
          key: ${{ runner.os }}-gradle-journal-${{ hashFiles('trading-journal-android/**/*.gradle*', 'trading-journal-android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-journal-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Strip hardcoded org.gradle.java.home
        run: |
          if [ -f gradle.properties ]; then
            sed -i '/^org\.gradle\.java\.home=/d' gradle.properties
            echo "--- gradle.properties after strip ---"
            cat gradle.properties
          fi

      - name: Build debug APK
        env:
          JAVA_TOOL_OPTIONS: ''
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace -Dorg.gradle.java.home="$JAVA_HOME"

      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find app/build/outputs/apk -name "*.apk" | head -n 1)
          echo "APK at: $APK_PATH"
          echo "path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tradeflow-journal-debug-apk
          path: trading-journal-android/${{ steps.apk.outputs.path }}
          retention-days: 14
