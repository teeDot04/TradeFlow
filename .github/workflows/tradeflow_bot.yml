name: TradeFlow Bot

on:
  schedule:
    - cron: '0 */4 * * *' # Run every 4 hours
  workflow_dispatch: # Manual Force Run
    inputs:
      execution_mode:
        description: 'Execution Mode'
        required: true
        default: 'REAL MONEY'
        type: choice
        options:
        - 'REAL MONEY'
        - 'Paper Mode'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Important for pushing state back
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install requests ccxt

      - name: Run Bot Scan
        env:
          # If manual input is 'Paper Mode', set IS_PAPER=True. Otherwise (Cron or Real), set False.
          IS_PAPER: ${{ github.event.inputs.execution_mode == 'Paper Mode' && 'True' || 'False' }}
          OKX_API_KEY: ${{ secrets.OKX_API_KEY }}
          OKX_SECRET: ${{ secrets.OKX_SECRET }}
          OKX_PASSWORD: ${{ secrets.OKX_PASSWORD }}
        run: python main.py

      - name: Commit State & Journal
        run: |
          git config --global user.name 'TradeFlow Bot'
          git config --global user.email 'bot@tradeflow.app'
          git add bot_state.json trades_journal.csv trades_export.json
          git commit -m "🤖 Bot Scan: Updated State & Journal" || echo "No changes to commit"
          git push
